<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay WEC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Barlow Condensed',sans-serif;width:300px;overflow:visible}
.board{width:300px}

.sh{
  display:flex;align-items:center;
  background:rgba(6,8,16,.97);
  border-bottom:2.5px solid #e10600;
  padding:5px 8px 5px 8px;gap:8px;
  margin-bottom:3px;
}
.sh-series{
  font-size:20px;font-weight:900;font-style:italic;
  color:#fff;letter-spacing:1px;text-transform:uppercase;
  flex-shrink:0;line-height:1;
  font-family:'Barlow Condensed',sans-serif;
}
.sh-session{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.75);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.3px;text-transform:uppercase;
}
.sh-lap{
  font-size:10px;font-weight:700;color:#f59e0b;
  font-family:'Inter',sans-serif;flex-shrink:0;letter-spacing:.5px;
}

.group{margin-bottom:3px}
.gh{
  display:flex;align-items:center;padding:3px 8px;gap:5px;
  background:rgba(6,8,16,.92);
  border-left:3px solid transparent;
}
.gh-label{
  font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:2px;flex-shrink:0;
  font-family:'Inter',sans-serif;
}
.gh-logo{width:18px;height:18px;object-fit:contain;border-radius:2px;margin-left:4px}

.row{
  display:flex;align-items:center;height:24px;
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.row:last-child{border-bottom:none}
.row.even{background:rgba(6,8,16,.96)}
.row.odd{background:rgba(12,14,24,.97)}
.row.p1{border-left:3px solid rgba(232,200,74,.9)}
.row.p2{border-left:3px solid rgba(200,208,216,.7)}
.row.p3{border-left:3px solid rgba(208,128,80,.8)}
.row.pn{border-left:3px solid rgba(255,255,255,.07)}

.rpos{width:20px;text-align:center;font-size:12px;font-weight:900;flex-shrink:0;line-height:1}
.rpos.p1{color:#e8c84a}.rpos.p2{color:#c8d0d8}.rpos.p3{color:#d08050}.rpos.pn{color:rgba(255,255,255,.55)}

.rnum{
  font-size:10px;font-weight:900;
  width:26px;text-align:center;flex-shrink:0;
  border-radius:2px;margin:0 3px;
  line-height:16px;height:16px;
  font-family:'Inter',sans-serif;letter-spacing:.5px;
}
.rcol{width:2px;flex-shrink:0;align-self:stretch;opacity:.8}
.rname{display:flex;align-items:center;gap:5px;flex:1;padding:0 5px 0 4px;overflow:hidden;min-width:0}
.abbrev{
  font-size:14px;font-weight:900;color:rgba(255,255,255,.95);
  letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.team-sub{
  font-size:9px;font-weight:600;color:rgba(255,255,255,.65);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Inter',sans-serif;letter-spacing:.3px;text-transform:uppercase;
}
.rlogo{width:18px;height:18px;flex-shrink:0;margin-right:4px;display:flex;align-items:center;justify-content:center}
.rlogo img{width:18px;height:18px;object-fit:contain;border-radius:2px}
.loading{padding:16px;text-align:center;font-size:12px;color:rgba(255,255,255,.25);background:rgba(6,8,16,.7);font-family:'Inter',sans-serif}
</style>
</head>
<body>
<div class="board" id="board"><div class="loading">Connexion…</div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_URL = "https://classementlive-fd5ff-default-rtdb.europe-west1.firebasedatabase.app";
const app = initializeApp({ databaseURL: FIREBASE_URL }, "overlay");
const db = getDatabase(app);

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function contrast(hex){const h=hex||'#888',r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}
function getAbbrev(fullname){const parts=(fullname||'').trim().split(' ');if(parts.length===1)return parts[0].slice(0,3).toUpperCase();return parts[parts.length-1].slice(0,3).toUpperCase();}

function renderRows(entries){
  if(!entries||entries.length===0)return '';
  return entries.map((e,i)=>{
    const pos=i+1;
    const pc=i===0?'p1':i===1?'p2':i===2?'p3':'pn';
    const even=i%2===0?'even':'odd';
    const col=e.color||'#555';
    const tc=contrast(col);
    const abbrev=e.abbrev||getAbbrev(e.name);
    const logo=e.logo?`<div class="rlogo"><img src="${esc(e.logo)}" alt=""></div>`:'';
    return `<div class="row ${pc} ${even}">
      <span class="rpos ${pc}">${pos}</span>
      <span class="rnum" style="background:${col};color:${tc}">${esc(e.num)}</span>
      <div class="rcol" style="background:${col}"></div>
      <div class="rname">
        <span class="abbrev">${esc(abbrev)}</span>
        <span class="team-sub">${esc(e.sub||'')}</span>
      </div>
      ${logo}
    </div>`;
  }).join('');
}

function render(d){
  const meta=d.meta||{};
  let html=`<div class="sh">
    <span class="sh-series">${esc(meta.series||'LIVE')}</span>
    <span class="sh-session">${esc(meta.session||'Session')}</span>
    <span class="sh-lap">${esc(meta.lap||'')}</span>
  </div>`;
  if(d.classes&&d.classes.length>0){
    d.classes.forEach(cl=>{
      const tc=cl.textColor||'#fff';
      const clLogo=cl.logo?`<img src="${esc(cl.logo)}" class="gh-logo" alt="">`:'';
      html+=`<div class="group">
        <div class="gh" style="border-left-color:${cl.color||'#555'}">
          <span class="gh-label" style="background:${cl.color||'#333'};color:${tc}">${esc(cl.label||'CLASS')}</span>
          ${clLogo}
        </div>
        ${renderRows(cl.entries||[])}
      </div>`;
    });
  } else {
    html+=`<div class="group">${renderRows(d.entries||[])}</div>`;
  }
  document.getElementById('board').innerHTML=html;
}

const dataRef = ref(db, 'classement');
onValue(dataRef, (snapshot) => {
  const d = snapshot.val();
  if (d) render(d);
}, () => {
  document.getElementById('board').innerHTML = '<div class="loading">Erreur connexion Firebase</div>';
});
</script>
</body>
</html>
